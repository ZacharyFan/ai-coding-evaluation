name: Python Lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Ruff
        run: python -m pip install ruff==0.15.10
      - name: Ruff check
        run: ruff check scripts tests
      - name: Ruff format
        run: ruff format --check scripts tests
